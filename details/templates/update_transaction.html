<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Transaction</title>

    <!-- Link to Bootstrap CSS for responsive design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS for extra styling -->
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f6f9;
            padding-top: 50px;
        }

        h2 {
            text-align: center;
            font-size: 28px;
            color: #2980b9;
            font-weight: 600;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        .form-label {
            font-size: 16px;
            color: #2c3e50;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px;
            font-size: 16px;
            background-color: #f9f9f9;
        }

        .btn-primary {
            background-color: #2980b9;
            border-color: #2980b9;
            font-size: 16px;
            padding: 12px 20px;
            border-radius: 8px;
            width: 100%;
            margin-top: 20px;
        }

        .btn-primary:hover {
            background-color: #1c5a8e;
            border-color: #1c5a8e;
        }

        .btn-secondary {
            background-color: #bdc3c7;
            border-color: #bdc3c7;
            padding: 8px 16px;
            border-radius: 8px;
            margin-top: 20px;
            display: block;
            width: 100%;
            text-align: center;
        }

        .btn-secondary:hover {
            background-color: #95a5a6;
            border-color: #95a5a6;
        }

        .mt-3 {
            margin-top: 30px;
        }

        /* Responsive design adjustments */
        @media (max-width: 576px) {
            h2 {
                font-size: 24px;
            }

            .btn-primary {
                font-size: 14px;
                padding: 10px 15px;
            }

            .form-control {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Update Transaction for {{ transaction.product_name }}</h2>
    <form method="POST">
        {% csrf_token %}
        <!-- Render the form fields -->
        {{ form.as_p }}

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary">Update Transaction</button>
    </form>

    <!-- Back Button -->
    <a href="{% url 'employee_detail' transaction.employee.id %}" class="btn btn-secondary mt-3">Back to Employee Details</a>
</div>

<!-- Link to Bootstrap JS and Popper.js for interactive components -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>

</body>
</html>
