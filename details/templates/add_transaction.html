<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Transaction</title>

    <!-- Link to Bootstrap CSS for responsive design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Link to Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7fb;
            padding-top: 60px;
            color: #333;
        }

        h2 {
            text-align: center;
            font-size: 32px;
            color: #333;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .container {
            max-width: 650px;
            margin: auto;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
            padding: 40px;
            background: #fff;
        }

        .form-label {
            font-size: 16px;
            color: #5f6368;
            font-weight: 600;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            font-size: 15px;
            background-color: #f1f3f4;
            border: 1px solid #ddd;
            transition: all 0.3s ease-in-out;
        }

        .form-control:focus {
            border-color: #00bcd4;
            box-shadow: 0 0 5px rgba(0, 188, 212, 0.5);
            outline: none;
        }

        .btn-primary {
            background-color: #00bcd4;
            border-color: #00bcd4;
            font-size: 18px;
            padding: 14px 20px;
            border-radius: 10px;
            width: 100%;
            margin-top: 20px;
            color: #fff;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background-color: #0097a7;
            border-color: #0097a7;
            transform: translateY(-3px);
        }

        .btn-secondary {
            background-color: #607d8b;
            border-color: #607d8b;
            padding: 12px 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: block;
            width: 100%;
            text-align: center;
            color: #fff;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background-color: #455a64;
            border-color: #455a64;
            transform: translateY(-3px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        /* Responsive design adjustments */
        @media (max-width: 576px) {
            h2 {
                font-size: 28px;
            }

            .container {
                padding: 15px;
            }

            .btn-primary {
                font-size: 16px;
                padding: 12px 16px;
            }

            .form-control {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Add Transaction for {{ employee.name }}</h2>
    <form method="POST">
        {% csrf_token %}
        <!-- Render the form fields dynamically -->
        {{ form.as_p }}

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary">Save Transaction</button>
    </form>

    <!-- Back Button -->
    <a href="{% url 'employee_detail' id=employee.id %}" class="btn btn-secondary mt-3">Back to Employee Details</a>
</div>

<!-- Link to Bootstrap JS and Popper.js for interactive components -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>

</body>
</html>
